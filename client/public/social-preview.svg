<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">IndiaFoodMap</title>
  <desc id="desc">Street food discovery platform for Ahmedabad.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="220" fill="#f59e0b" opacity="0.15"/>
  <circle cx="1080" cy="520" r="250" fill="#fb923c" opacity="0.12"/>
  <text x="90" y="280" fill="#f8fafc" font-size="72" font-family="Poppins, Arial, sans-serif" font-weight="700">IndiaFoodMap</text>
  <text x="90" y="350" fill="#fde68a" font-size="36" font-family="Poppins, Arial, sans-serif">Find the Best Street Food Near You</text>
  <text x="90" y="420" fill="#e2e8f0" font-size="28" font-family="Poppins, Arial, sans-serif">Ahmedabad local stalls, reviews, and maps</text>
</svg>
